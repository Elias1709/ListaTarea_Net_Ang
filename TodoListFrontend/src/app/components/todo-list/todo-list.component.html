
<div class="content">
    <mat-card>
        <mat-card-title>
            <button mat-raised-button color="primary" (click)="createTodo()" class="m-2">
                <mat-icon mat-list-icon>add</mat-icon>Nuevo
              </button>
        </mat-card-title>
        
        <mat-divider></mat-divider>
        <mat-card-content>            
            
                <div class="mat-elevation-z8" style="overflow-x: auto;">
                    <table mat-table [dataSource]="dataSource">
                        <ng-container matColumnDef="title">
                            <th mat-header-cell *matHeaderCellDef> Título</th>
                            <td mat-cell *matCellDef="let element"> {{element.title}} </td>
                        </ng-container>
                        <ng-container matColumnDef="description">
                            <th mat-header-cell *matHeaderCellDef> Descripción</th>
                            <td mat-cell *matCellDef="let element"> {{element.description}} </td>
                        </ng-container>
                        <ng-container matColumnDef="maxCompletionDate">
                            <th mat-header-cell *matHeaderCellDef> Fecha de finalidad</th>
                            <td mat-cell *matCellDef="let element"> {{element.maxCompletionDate}} </td>
                        </ng-container>
                        
                        <ng-container matColumnDef="isCompleted">
                            <th mat-header-cell *matHeaderCellDef> Estado </th>
                                <td mat-cell *matCellDef="let element">
                                    {{ element.isCompleted ? 'Hecho' : 'Pendiente' }}
                                </td>
                        </ng-container>
                        <ng-container matColumnDef="createdAt">
                            <th mat-header-cell *matHeaderCellDef> Fecha creada</th>
                            <td mat-cell *matCellDef="let element"> {{element.createdAt}} </td>
                        </ng-container>
                        <ng-container matColumnDef="acciones">
                    <th mat-header-cell *matHeaderCellDef> Acciones </th>
                    <td mat-cell *matCellDef="let element">
                        <button mat-icon-button color="accent" (click)="getTodo(element.id)">
                            <mat-icon>visibility</mat-icon>
                        </button>
                        <button mat-icon-button color="primary"  (click)="updateTodo(element)">
                            <mat-icon>edit</mat-icon>
                        </button>
                        <button mat-icon-button color="warn" (click)="deleteTodo(element.id)">
                          <mat-icon>delete</mat-icon>
                        </button>
                    </td> 
                  </ng-container>
                  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr> 
                    </table>

                </div>
            
        </mat-card-content>
    </mat-card>

</div>
